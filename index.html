<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookpad Mini</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      background-color: #fff8f5;
    }
    h1 {
      text-align: center;
      color: #e74c3c;
    }
    input {
      padding: 10px;
      width: 70%;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px 15px;
      margin-left: 5px;
      background-color: #e74c3c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #c0392b;
    }
    ul {
      margin-top: 20px;
      list-style: none;
      padding: 0;
    }
    li {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    li:hover {
      background-color: #ffe6e0;
    }
  </style>
</head>
<body>

  <h1>Cookpad Mini</h1>
  <input type="text" id="searchInput" placeholder="Cari resep...">
  <button id="searchBtn">Cari</button>

  <ul id="recipeList"></ul>

  <script>
    // Data resep
    const recipes = [
      "Ayam Geprek",
      "Ayam Goreng",
      "Nasi Goreng",
      "Mie Goreng",
      "Ayam Bakar",
      "Tumis Kangkung",
      "Sate Ayam",
      "Pecel Lele"
    ];

    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const recipeList = document.getElementById("recipeList");

    function searchRecipe() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = recipes.filter(r => r.toLowerCase().includes(query));

      // Kosongkan daftar sebelumnya
      recipeList.innerHTML = "";

      if (filtered.length === 0) {
        recipeList.innerHTML = "<li>Tidak ada resep ditemukan</li>";
      } else {
        filtered.forEach(r => {
          const li = document.createElement("li");
          li.textContent = r;
          recipeList.appendChild(li);
        });
      }
    }

    // Event listener
    searchBtn.addEventListener("click", searchRecipe);
    searchInput.addEventListener("keyup", function(e) {
      if (e.key === "Enter") searchRecipe();
    });
  </script>

</body>
</html>
