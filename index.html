<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crosshair Valorant</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: #fff;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #1c1c1c;
    }

    h1 {
      margin: 0;
      color: #ff3c3c;
    }

    .controls {
      display: flex;
      gap: 10px;
      padding: 15px;
      justify-content: center;
      flex-wrap: wrap;
      background: #1c1c1c;
    }

    input, select {
      padding: 10px;
      border-radius: 5px;
      border: none;
      width: 200px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #222;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .card .info {
      padding: 10px;
    }

    .card h3 {
      margin: 0;
      font-size: 14px;
    }

    .card p {
      margin: 5px 0 0;
      font-size: 12px;
      color: #bbb;
    }

    /* MODAL */
    #modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.8);
    }

    .modal-content {
      background: #222;
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
      width: 90%;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      cursor: pointer;
    }
  </style>
</head>

const videoList = document.getElementById("videoList");
const searchInput = document.getElementById("searchInput");
const genreFilter = document.getElementById("genreFilter");

const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modalTitle");
const modalGenre = document.getElementById("modalGenre");
const modalYear = document.getElementById("modalYear");
const modalDesc = document.getElementById("modalDesc");

function render(list){
  videoList.innerHTML = "";

  list.forEach(v => {
    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = v.img;

    const info = document.createElement("div");
    info.className = "info";

    const title = document.createElement("h3");
    title.textContent = v.title;

    const meta = document.createElement("p");
    meta.textContent = v.genre + " | " + v.year;

    info.appendChild(title);
    info.appendChild(meta);

    card.appendChild(img);
    card.appendChild(info);

    card.onclick = function(){
      modal.style.display = "flex";
      modalTitle.textContent = v.title;
      modalGenre.textContent = "Genre: " + v.genre;
      modalYear.textContent = "Tahun: " + v.year;
      modalDesc.textContent = v.desc;
    };

    videoList.appendChild(card);
  });
}

function filter(){
  const q = searchInput.value.toLowerCase();
  const g = genreFilter.value;

  const result = videos.filter(v =>
    v.title.toLowerCase().includes(q) &&
    (g === "all" || v.genre === g)
  );

  render(result);
}

searchInput.addEventListener("keyup", filter);
genreFilter.addEventListener("change", filter);

document.getElementById("closeBtn").onclick = () => modal.style.display = "none";
window.onclick = e => { if(e.target === modal) modal.style.display = "none"; };

render(videos);
