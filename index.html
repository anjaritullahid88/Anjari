<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCRDB Mini</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: auto;
      background-color: #f5f5f5;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    input {
      padding: 10px;
      width: 70%;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px 15px;
      margin-left: 5px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
    ul {
      margin-top: 20px;
      list-style: none;
      padding: 0;
    }
    li {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      transition: background-color 0.2s;
    }
    li:hover {
      background-color: #e0e0e0;
    }
  </style>
</head>
<body>

  <h1>VCRDB Mini</h1>
  <input type="text" id="searchInput" placeholder="Cari video...">
  <button id="searchBtn">Cari</button>

  <ul id="videoList"></ul>

  <script>
    // Data koleksi video
    const videos = [
      { title: "VHS Classic Movie", year: 1990 },
      { title: "Action Movie 2000", year: 2000 },
      { title: "Horror Flick", year: 1985 },
      { title: "Romantic Comedy", year: 1995 },
      { title: "Sci-Fi Adventure", year: 2010 }
    ];

    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const videoList = document.getElementById("videoList");

    function searchVideo() {
      const query = searchInput.value.trim().toLowerCase();

      // Filter data video berdasarkan query
      const filtered = videos.filter(v => v.title.toLowerCase().includes(query));

      // Kosongkan daftar sebelumnya
      videoList.innerHTML = "";

      if(filtered.length === 0) {
        const li = document.createElement("li");
        li.textContent = "Tidak ada video ditemukan";
        videoList.appendChild(li);
      } else {
        filtered.forEach(v => {
          const li = document.createElement("li");
          li.textContent = `${v.title} (${v.year})`;
          videoList.appendChild(li);
        });
      }
    }

    // Event listener
    searchBtn.addEventListener("click", searchVideo);
    searchInput.addEventListener("keyup", function(e) {
      if(e.key === "Enter") searchVideo();
    });
  </script>

</body>
</html>
