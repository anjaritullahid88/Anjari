<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCRDB Mini Advanced</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 900px;
      margin: auto;
      background-color: #f5f5f5;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .controls {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    input, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      flex: 1;
      margin-right: 10px;
    }
    button {
      padding: 10px 15px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background-color: #555; }
    ul { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    li {
      background: white;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }
    li:hover { transform: scale(1.03); }
    li img { width: 100%; display: block; }
    li .info { padding: 10px; }
    li .info h3 { margin: 0 0 5px 0; font-size: 16px; }
    li .info p { margin: 0; font-size: 14px; color: #666; }
    #modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center;
    }
    #modal .content {
      background: white; padding: 20px; border-radius: 6px; max-width: 500px; width: 90%;
    }
    #modal .content h2 { margin-top: 0; }
    #modal .close {
      position: absolute; top: 10px; right: 20px; cursor: pointer; font-size: 24px; color: white;
    }
  </style>
</head>
<body>

  <h1>VCRDB Mini Advanced</h1>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Cari video...">
    <select id="genreFilter">
      <option value="all">Semua Genre</option>
      <option value="Action">Action</option>
      <option value="Horror">Horror</option>
      <option value="Comedy">Comedy</option>
      <option value="Sci-Fi">Sci-Fi</option>
    </select>
    <button id="searchBtn">Cari</button>
  </div>

  <ul id="videoList"></ul>

  <!-- Modal Detail -->
  <div id="modal">
    <div class="content">
      <h2 id="modalTitle"></h2>
      <p id="modalGenre"></p>
      <p id="modalYear"></p>
      <p id="modalDesc"></p>
    </div>
    <div class="close" id="modalClose">&times;</div>
  </div>

  <script>
    const videos = [
      { title: "VHS Classic Movie", year: 1990, genre: "Comedy", desc: "Film klasik VHS yang lucu.", img: "https://via.placeholder.com/200x120?text=VHS+Classic" },
      { title: "Action Movie 2000", year: 2000, genre: "Action", desc: "Film aksi menegangkan.", img: "https://via.placeholder.com/200x120?text=Action+2000" },
      { title: "Horror Flick", year: 1985, genre: "Horror", desc: "Film horor klasik.", img: "https://via.placeholder.com/200x120?text=Horror+Flick" },
      { title: "Romantic Comedy", year: 1995, genre: "Comedy", desc: "Rom-com manis dan lucu.", img: "https://via.placeholder.com/200x120?text=Romantic+Comedy" },
      { title: "Sci-Fi Adventure", year: 2010, genre: "Sci-Fi", desc: "Petualangan sains futuristik.", img: "https://via.placeholder.com/200x120?text=Sci-Fi+Adventure" }
    ];

    const searchInput = document.getElementById("searchInput");
    const genreFilter = document.getElementById("genreFilter");
    const searchBtn = document.getElementById("searchBtn");
    const videoList = document.getElementById("videoList");

    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const modalGenre = document.getElementById("modalGenre");
    const modalYear = document.getElementById("modalYear");
    const modalDesc = document.getElementById("modalDesc");
    const modalClose = document.getElementById("modalClose");

    function renderVideos(list) {
      videoList.innerHTML = "";
      if(list.length === 0){
        videoList.innerHTML = "<li>Tidak ada video ditemukan</li>";
        return;
      }

      list.forEach(v => {
        const li = document.createElement("li");
        li.innerHTML = `
          <img src="${v.img}" alt="${v.title}">
          <div class="info">
            <h3>${v.title}</h3>
            <p>${v.genre} | ${v.year}</p>
          </div>
        `;
        li.addEventListener("click", () => showModal(v));
        videoList.appendChild(li);
      });
    }

    function searchVideo() {
      const query = searchInput.value.trim().toLowerCase();
      const genre = genreFilter.value;
      const filtered = videos.filter(v => 
        v.title.toLowerCase().includes(query) &&
        (genre === "all" || v.genre === genre)
      );
      renderVideos(filtered);
    }

    function showModal(video) {
      modal.style.display = "flex";
      modalTitle.textContent = video.title;
      modalGenre.textContent = `Genre: ${video.genre}`;
      modalYear.textContent = `Tahun: ${video.year}`;
      modalDesc.textContent = video.desc;
    }

    modalClose.addEventListener("click", () => modal.style.display = "none");
    window.addEventListener("click", e => { if(e.target === modal) modal.style.display = "none"; });

    searchBtn.addEventListener("click", searchVideo);
    searchInput.addEventListener("keyup", e => { if(e.key === "Enter") searchVideo(); });

    // Render semua video saat pertama kali buka
    renderVideos(videos);
  </script>

</body>
</html>
